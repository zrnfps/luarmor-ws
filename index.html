<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kanye Admin Panel</title>

<style>
body {
  margin:0;
  background:#0b0b0b;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#ddd;
}

.panel {
  width:380px;
  background:#111;
  border:1px solid #222;
  border-radius:10px;
}

.header {
  padding:10px;
  background:#151515;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
}

.section {
  padding:10px;
  border-bottom:1px solid #1a1a1a;
}

.title {
  font-size:12px;
  color:#777;
  margin-bottom:5px;
}

.players {
  max-height:150px;
  overflow:auto;
}

.player {
  padding:6px;
  border:1px solid #333;
  margin-bottom:4px;
  cursor:pointer;
}

.player:hover {
  background:#333;
}

.btn {
  background:#1a1a1a;
  border:1px solid #333;
  padding:6px;
  margin-top:5px;
  cursor:pointer;
  text-align:center;
}

input {
  width:100%;
  padding:6px;
  margin-bottom:5px;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
}
</style>
</head>

<body>

<div class="panel">

<div class="header">
  <span>KANYE PANEL</span>
  <span id="status">OFF</span>
</div>

<div class="section">
  <div class="title">PLAYERS</div>
  <div id="players" class="players"></div>
  <div class="btn" onclick="refresh()">Refresh</div>
</div>

<div class="section">
  <div class="title">CHAT</div>
  <input id="name" placeholder="Player">
  <input id="msg" placeholder="Message">
  <div class="btn" onclick="sendChat()">Send</div>
</div>

<div class="section">
  <div class="title">ACTIONS</div>
  <div class="btn" onclick="send('Ragdoll')">Ragdoll</div>
  <div class="btn" onclick="send('Control')">Control</div>
  <div class="btn" onclick="send('Jail')">Jail</div>
  <div class="btn" onclick="send('Jumpscr')">Jumpscr</div>
  <div class="btn" onclick="send('Balloon')">Balloon</div>
  <div class="btn" onclick="send('Inverse')">Inverse</div>
  <div class="btn" onclick="send('Morph')">Morph</div>
</div>

</div>

<script>
let ws;

const playersBox = document.getElementById("players");
const statusEl = document.getElementById("status");

// 🔥 CONEXÃO SEGURA
function connect(){
  try{
    ws = new WebSocket("wss://luarmor-ws.onrender.com/ws");
  }catch(e){
    console.log("erro conectar", e);
    return;
  }

  ws.onopen = ()=>{
    console.log("WS conectado");

    statusEl.textContent = "ONLINE";

    ws.send(JSON.stringify({
      type:"register",
      client:"site"
    }));
  };

  ws.onclose = ()=>{
    console.log("WS fechado");
    statusEl.textContent = "OFF";
    setTimeout(connect,2000);
  };

  ws.onerror = (e)=>{
    console.log("WS erro", e);
  };

  ws.onmessage = (e)=>{
    try{
      console.log("📩", e.data);

      const data = JSON.parse(e.data);

      if(data.type === "players"){
        renderPlayers(data.list);
      }

    }catch(err){
      console.log("erro json", err);
    }
  };
}

// 🔥 RENDER PLAYERS (SEGURO)
function renderPlayers(list){
  if(!Array.isArray(list)) return;

  playersBox.innerHTML = "";

  list.forEach(p=>{
    const el = document.createElement("div");
    el.className = "player";
    el.textContent = p;

    el.onclick = ()=>{
      document.getElementById("name").value = p;

      if(navigator.clipboard){
        navigator.clipboard.writeText(p).catch(()=>{});
      }
    };

    playersBox.appendChild(el);
  });
}

// 🔥 SEND BUTTON
function send(name){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({button:name}));
  }
}

// 🔥 SEND CHAT
function sendChat(){
  if(!ws || ws.readyState !== 1) return;

  const player = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;

  if(!player || !msg) return;

  ws.send(JSON.stringify({
    type:"chat",
    player:player,
    message:msg,
    id: Date.now()+"_"+Math.random()
  }));
}

// 🔥 REFRESH
function refresh(){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({type:"refresh"}));
  }
}

// INIT
connect();
</script>

</body>
</html>
