<!DOCTYPE html>
<html>
<head>
<title>Kanye Hub</title>

<style>
body {
  margin:0;
  background:#0b0b0b;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#ddd;
}

.panel {
  width:400px;
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.header {
  padding:10px;
  background:#151515;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#888;
}

.section {
  padding:10px;
  border-bottom:1px solid #1a1a1a;
}

.title {
  font-size:11px;
  color:#666;
  margin-bottom:6px;
}

input {
  width:100%;
  padding:7px;
  margin-bottom:6px;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
  border-radius:6px;
}

.btn {
  background:#1a1a1a;
  border:1px solid #333;
  padding:7px;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
  transition:0.15s;
}

.btn:hover {
  background:#2a2a2a;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
}

/* PLAYERS */
.players {
  max-height:150px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.player {
  padding:7px;
  border-radius:6px;
  border:1px solid #333;
  background:#141414;
  cursor:pointer;
  font-size:12px;
  transition:0.1s;
}

.player:hover {
  background:#2a2a2a;
  border-color:#555;
}

/* STATUS */
.online { color:#4cff7a; }
.offline { color:#ff4c4c; }
</style>
</head>

<body>

<div class="panel">

  <div class="header">
    <span>KANYE ADMIN PANEL</span>
    <span id="status" class="offline">OFF</span>
  </div>

  <!-- PLAYERS -->
  <div class="section">
    <div class="title">PLAYERS (LIVE)</div>

    <div id="players" class="players"></div>

    <div class="btn" onclick="refresh()">Refresh Players</div>
  </div>

  <!-- CHAT -->
  <div class="section">
    <div class="title">CHAT CONTROL</div>

    <input id="name" placeholder="Player Name">
    <input id="msg" placeholder="Message">

    <div class="btn" onclick="sendChat()">Send Message</div>
  </div>

  <!-- ACTIONS -->
  <div class="section">
    <div class="title">ACTIONS</div>

    <div class="grid">
      <div class="btn" onclick="send('Ragdoll')">Ragdoll</div>
      <div class="btn" onclick="send('Control')">Control</div>
      <div class="btn" onclick="send('Jail')">Jail</div>
      <div class="btn" onclick="send('Jumpscr')">Jumpscr</div>
      <div class="btn" onclick="send('Balloon')">Balloon</div>
      <div class="btn" onclick="send('Inverse')">Inverse</div>
      <div class="btn" onclick="send('Morph')">Morph</div>
    </div>
  </div>

</div>

<script>
let ws;
const playersBox = document.getElementById("players");
const statusEl = document.getElementById("status");

function connect(){
  ws = new WebSocket("wss://luarmor-ws.onrender.com/ws");

  ws.onopen = ()=>{
    statusEl.textContent = "ONLINE";
    statusEl.className = "online";

    ws.send(JSON.stringify({
      type:"register",
      client:"site"
    }));
  };

  ws.onclose = ()=>{
    statusEl.textContent = "RECONNECT";
    statusEl.className = "offline";
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e)=>{
    try{
      const data = JSON.parse(e.data);

      if(data.type === "players"){
        renderPlayers(data.list);
      }

    }catch{}
  };
}

function renderPlayers(list){
  playersBox.innerHTML = "";

  list.forEach(p=>{
    const el = document.createElement("div");
    el.className = "player";
    el.textContent = p;

    el.onclick = ()=>{
      document.getElementById("name").value = p;

      // copia automático
      navigator.clipboard?.writeText(p).catch(()=>{});
    };

    playersBox.appendChild(el);
  });
}

function send(name){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({button:name}));
  }
}

function sendChat(){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({
      type:"chat",
      player:document.getElementById("name").value,
      message:document.getElementById("msg").value,
      id: Date.now() + "_" + Math.random()
    }));
  }
}

function refresh(){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({type:"refresh"}));
  }
}

connect();
</script>

</body>
</html>
