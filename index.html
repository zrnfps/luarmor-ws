<!DOCTYPE html>
<html>
<head>
<title>Kanye Hub</title>

<style>
body {
  margin:0;
  background:#0b0b0b;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
  color:#ddd;
}

.panel {
  width:380px;
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* HEADER */
.header {
  padding:10px;
  background:#151515;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#888;
}

/* SECTION */
.section {
  padding:10px;
  border-bottom:1px solid #1a1a1a;
}

.title {
  font-size:11px;
  color:#666;
  margin-bottom:6px;
}

/* BUTTON */
.btn {
  background:#1a1a1a;
  border:1px solid #333;
  padding:6px;
  text-align:center;
  cursor:pointer;
  border-radius:5px;
  transition:0.15s;
}

.btn:hover {
  background:#2a2a2a;
}

/* INPUT */
input {
  width:100%;
  padding:6px;
  margin-bottom:6px;
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
  border-radius:5px;
}

/* PLAYERS */
.players {
  max-height:140px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.player {
  padding:6px;
  border-radius:5px;
  border:1px solid #333;
  background:#141414;
  cursor:pointer;
  font-size:12px;
  transition:0.1s;
}

.player:hover {
  background:#2a2a2a;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:5px;
}
</style>
</head>

<body>

<div class="panel">

  <div class="header">
    <span>KANYE HUB</span>
    <span id="status">...</span>
  </div>

  <!-- PLAYERS -->
  <div class="section">
    <div class="title">PLAYERS</div>

    <div id="players" class="players"></div>

    <div class="btn" onclick="refreshPlayers()">Refresh Players</div>
  </div>

  <!-- CHAT -->
  <div class="section">
    <div class="title">CHAT BUBBLE</div>

    <input id="playerName" placeholder="Player name">
    <input id="message" placeholder="Message">

    <div class="btn" onclick="sendChat()">Send</div>
  </div>

  <!-- ACTIONS -->
  <div class="section">
    <div class="title">ACTIONS</div>

    <div class="grid">
      <div class="btn" onclick="sendBtn('Ragdoll')">Ragdoll</div>
      <div class="btn" onclick="sendBtn('Control')">Control</div>
      <div class="btn" onclick="sendBtn('Jail')">Jail</div>
      <div class="btn" onclick="sendBtn('Jumpscr')">Jumpscr</div>
      <div class="btn" onclick="sendBtn('Balloon')">Balloon</div>
      <div class="btn" onclick="sendBtn('Inverse')">Inverse</div>
      <div class="btn" onclick="sendBtn('Morph')">Morph</div>
    </div>
  </div>

</div>

<script>
let ws;
const playersBox = document.getElementById("players");
const statusEl = document.getElementById("status");

function connect(){
  ws = new WebSocket("wss://luarmor-ws.onrender.com/ws");

  ws.onopen = ()=>{
    statusEl.textContent = "ONLINE";
    statusEl.style.color = "#4cff7a";
  };

  ws.onclose = ()=>{
    statusEl.textContent = "RECONNECT";
    statusEl.style.color = "#ff4c4c";
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e)=>{
    try{
      const data = JSON.parse(e.data);

      if(data.type === "players"){
        updatePlayers(data.list);
      }

    }catch{}
  };
}

function updatePlayers(list){
  playersBox.innerHTML = "";

  list.forEach(name=>{
    const el = document.createElement("div");
    el.className = "player";
    el.textContent = name;

    el.onclick = ()=>{
      document.getElementById("playerName").value = name;

      if(navigator.clipboard){
        navigator.clipboard.writeText(name).catch(()=>{});
      }
    };

    playersBox.appendChild(el);
  });
}

function sendBtn(name){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({button:name}));
  }
}

function sendChat(){
  const name = document.getElementById("playerName").value;
  const msg = document.getElementById("message").value;

  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({
      type:"chat",
      player:name,
      message:msg
    }));
  }
}

/* 🔥 REFRESH MANUAL */
function refreshPlayers(){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({type:"refresh"}));
  }
}

connect();
</script>

</body>
</html>
