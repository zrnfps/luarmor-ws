<!DOCTYPE html>
<html>
<head>
<title>Kanye Hub</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #0b0b0b;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: #ddd;
}

.panel {
  width: 380px;
  background: #111;
  border: 1px solid #222;
  border-radius: 8px;
  overflow: hidden;
}

/* HEADER */
.header {
  background: #151515;
  padding: 10px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #888;
}

/* SECTIONS */
.section {
  padding: 10px;
  border-bottom: 1px solid #1a1a1a;
}

.section-title {
  font-size: 10px;
  color: #555;
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* BUTTON GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

/* BUTTON STYLE */
.btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  padding: 7px;
  font-size: 12px;
  text-align: center;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.12s;
}

.btn:hover {
  background: #242424;
  border-color: #444;
}

.btn:active {
  transform: scale(0.95);
}

/* HISTORY */
.history {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.hist {
  padding: 5px 7px;
  font-size: 11px;
  border-radius: 4px;
  border: 1px solid #333;
  background: #1a1a1a;
  cursor: pointer;
}

.hist.on {
  color: #4cff7a;
  border-color: #4cff7a;
}

.hist.off {
  color: #ff4c4c;
  border-color: #ff4c4c;
}

/* STATUS */
.status {
  text-align: center;
  font-size: 11px;
  padding: 6px;
  color: #555;
}
</style>
</head>

<body>

<div class="panel">

  <div class="header">
    <span>KANYE HUB</span>
    <span id="status">...</span>
  </div>

  <!-- EFFECTS -->
  <div class="section">
    <div class="section-title">EFFECTS</div>

    <div class="grid">
      <div class="btn" onclick="send('Ragdoll')">Ragdoll</div>
      <div class="btn" onclick="send('Control')">Control</div>
      <div class="btn" onclick="send('Jail')">Jail</div>
      <div class="btn" onclick="send('Jumpscr')">Jumpscr</div>
      <div class="btn" onclick="send('Balloon')">Balloon</div>
      <div class="btn" onclick="send('Inverse')">Inverse</div>
      <div class="btn" onclick="send('Morph')">Morph</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section">
    <div class="section-title">LIVE SYNC</div>
    <div id="history" class="history"></div>
  </div>

  <div class="status">Real-time synced</div>

</div>

<script>
let ws;
const historyBox = document.getElementById('history');
const statusEl = document.getElementById('status');

const states = JSON.parse(localStorage.getItem("states") || "{}");

function connect(){
  ws = new WebSocket("wss://luarmor-ws.onrender.com/ws");

  ws.onopen = ()=>{
    statusEl.textContent = "ONLINE";
    statusEl.style.color = "#4cff7a";
  };

  ws.onclose = ()=>{
    statusEl.textContent = "RECONNECT";
    statusEl.style.color = "#ff4c4c";
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e)=>{
    try{
      const d = JSON.parse(e.data);

      if(d.button){
        states[d.button] = d.state ?? true;
        save();
        update(d.button);
      }
    }catch{}
  };
}

function send(name){
  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({button:name}));
  }
}

function update(name){
  let el = document.getElementById(name);

  if(!el){
    el = document.createElement("div");
    el.id = name;
    el.className = "hist";
    el.onclick = ()=>send(name);
    historyBox.appendChild(el);
  }

  const state = states[name];

  el.textContent = name;
  el.classList.remove("on","off");
  el.classList.add(state ? "on" : "off");
}

function save(){
  localStorage.setItem("states", JSON.stringify(states));
}

for(let k in states){
  update(k);
}

connect();
</script>

</body>
</html>
