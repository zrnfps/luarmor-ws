<!DOCTYPE html>
<html>
<body style="background:#111;color:#0f0;font-family:monospace">

<h2>KANYE HUB AUTO</h2>

<div id="buttons"></div>

<hr>

<div id="log"></div>

<script>
let ws
const created = new Set()

function log(msg){
  document.getElementById("log").innerHTML += "<br>"+msg
}

function createButton(name){
  if (!name || created.has(name)) return
  created.add(name)

  const btn = document.createElement("button")
  btn.innerText = name

  btn.onclick = () => {
    ws.send(JSON.stringify({
      type: "button",
      name: name
    }))
    log("📤 " + name)
  }

  document.getElementById("buttons").appendChild(btn)
}

function connect(){
  ws = new WebSocket("wss://luarmor-ws.onrender.com/ws")

  ws.onopen = () => log("🟢 conectado")

  ws.onmessage = async (e) => {
    let text

    if (e.data instanceof Blob) {
      text = await e.data.text()
    } else {
      text = e.data
    }

    log("📩 " + text)

    try {
      const data = JSON.parse(text)

      if (data.type === "button") {
        createButton(data.name)
      }

      if (data.type === "remote") {
        createButton(data.remote)
      }

    } catch {}
  }

  ws.onclose = () => log("🔴 desconectado")
  ws.onerror = () => log("⚠️ erro")
}

connect()
</script>

</body>
</html>
