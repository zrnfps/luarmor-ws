<!DOCTYPE html><html><head><title>Luarmor</title><style>body{font-family:monospace;background:#000;color:#0f0;height:100vh;padding:20px;overflow:hidden;}#c{height:100vh;overflow-y:auto;}#c>div{padding:10px;border-left:3px solid #0f0;margin:2px}</style></head><body><div id="c"></div><script>const w=new WebSocket(`wss://${location.host}`);w.onmessage=e=>{const d=JSON.parse(e.data),c=document.getElementById('c'),l=document.createElement('div');l.innerHTML=`[${new Date().toLocaleTimeString()}] ${d.payload?.signal||'ping'}`,c.appendChild(l),c.scrollTop=c.scrollHeight}</script></body></html>
