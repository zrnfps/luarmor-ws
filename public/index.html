<!DOCTYPE html><html><head><title>Luarmor Volt</title><style>body{font-family:monospace;background:#000;color:#0f0;height:100vh;padding:20px;overflow:hidden;}#log{height:100vh;overflow-y:auto;}#log>div{padding:12px;border-left:4px solid #0f0;margin:3px 0;font-family:monospace}</style></head><body><div id="log"><div>🔥 Aguardando Luarmor...</div></div><script>const ws=new WebSocket('wss://'+location.host+'/ws');ws.onmessage=e=>{const d=e.data,l=document.getElementById('log'),div=document.createElement('div');div.innerHTML=`[${new Date().toLocaleTimeString()}] 🖱️ ${d}`,l.appendChild(div),l.scrollTop=l.scrollHeight}</script></body></html>
